site_name: Windows Optimisations
site_description: Comprehensive collection of scripts and tools to optimize Windows 10/11 for peak performance, gaming, and privacy.
repo_url: https://github.com/YTxFSGAMERz/Windows-Optimisations
repo_name: Windows-Optimisations

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

site_url: https://windows-optimizations.netlify.app/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YTxFSGAMERz
    - icon: fontawesome/brands/whatsapp
      link: https://wa.me/917778906798
    - icon: fontawesome/solid/paper-plane
      link: https://t.me/YTxFSGAMERz

plugins:
  - search
  - mermaid2
  - glightbox
  - social:
      cards_layout_options:
        background_color: "#1e1e1e"
        color: "#00bcd4"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation:
      - Unattended Install: AUTOUNATTEND.md
      - Activators: ACTIVATORS.md
  - Architecture:
      - System Blueprint: Architecture_Blueprint.md
      - GUI Architecture: Dashboard_Architecture.md
      - OS Compatibility: Compatibility_Matrix.md
  - System Tweaks: TWEAKS.md
  - Deep Dives:
      - Input Latency Myths: Input_Latency_Myths.md
      - Myths and Anti-Patterns: Myths_and_Anti_Patterns.md
      - Registry Reference: Registry_Reference.md
  - Drivers & Hardware:
      - Drivers: DRIVERS.md
      - Hardware Monitoring: HARDWARE.md
  - Software & Utilities:
      - Web Browsers: BROWSERS.md
      - WebView2 Info: WEBVIEW.md
      - Extra Utilities: EXTRA.md
  - Security & Updates:
      - Antivirus & Security: ANTIVIRUS.md
      - Windows Update: WINDOWS_UPDATE.md
